services:
  playwright-mcp-router:
    build:
      context: ${BROWSER_RUNTIME_CONTEXT:-../browser-runtime}
      dockerfile: docker/playwright/Dockerfile
      additional_contexts:
        workflow_container_contract: ${WORKFLOW_CONTAINER_CONTRACT_CONTEXT:-../workflow-container-contract}
    command:
      - browser-runtime-playwright-mcp-router
      - --allowed-hosts
      - localhost,127.0.0.1,playwright-mcp-router
      - --backend-runtime-root-path
      - /runtime/playwright_mcp_backend
      - --candidate-root-path
      - /runtime/mcp_playwright_profile/writeback_candidate
      - --secret-root-path
      - /input/.secret
      - --output-root-path
      - /output/.playwright-mcp
      - --profile-root-path
      - /runtime/mcp_playwright_profile/profile
      - --host
      - 0.0.0.0
      - --port
      - "8931"
    environment:
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 8931), 2).close()"
      timeout: 5s
    networks:
      - browser-control
      - runtime-uplink
    volumes:
      - type: bind
        source: ./.secret/playwright_profile
        target: /input/.secret/playwright_profile
        read_only: true
        bind:
          create_host_path: false
      - browser-profile-runtime:/runtime/mcp_playwright_profile
      - ${OUTPUT_DIR:-./out}:/output

  workflow:
    build:
      args:
        WORKFLOW_PLATFORM_BASE_IMAGE: ${WORKFLOW_PLATFORM_BASE_IMAGE:-127.0.0.1:5001/apwid-workflow-platform-base:0.7.0}
      context: .
      dockerfile: docker/workflow/Dockerfile
    command:
      - brand-size-chart-run
    depends_on:
      playwright-mcp-router:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DBOS_SYSTEM_DATABASE_URL: sqlite:////runtime/dbos.sqlite
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      WORKFLOW_CAPABILITY_CONFIG_PATH: /input/capability.json
      WORKFLOW_CONTROL_URL: ${WORKFLOW_CONTROL_URL:?Set WORKFLOW_CONTROL_URL to a v2 control proxy reachable from Compose}
      WORKFLOW_INPUT_PATH: /input/input.json
      WORKFLOW_RUN_CONTEXT_PATH: /input/run-context.json
      WORKFLOW_RUN_ID: ${WORKFLOW_RUN_ID:?Set WORKFLOW_RUN_ID to the 17-digit id in RUN_CONTEXT_JSON}
      WORKFLOW_RUNTIME_PATH: /runtime
    networks:
      - browser-control
      - runtime-uplink
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    volumes:
      - type: bind
        source: ./.secret/codex_profile
        target: /input/.secret/codex_profile
        read_only: true
        bind:
          create_host_path: false
      - ${CAPABILITY_JSON:-./compose.capability.json}:/input/capability.json:ro
      - type: bind
        source: ${INPUT_JSON:?Set INPUT_JSON to a complete workflow input JSON file path}
        target: /input/input.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${RUN_CONTEXT_JSON:?Set RUN_CONTEXT_JSON to a complete WorkflowRunContext JSON file path}
        target: /input/run-context.json
        read_only: true
        bind:
          create_host_path: false
      - ${OUTPUT_DIR:-./out}:/result
      - workflow-runtime:/runtime
      - workflow-workspace:/workspace

volumes:
  browser-profile-runtime:
  workflow-runtime:
  workflow-workspace:

networks:
  browser-control:
    internal: true
  runtime-uplink:
    internal: false
