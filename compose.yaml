services:
  vpn-egress:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/openvpn/Dockerfile
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    profiles:
      - vpn
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 1080), 2).close()"
      timeout: 5s
    networks:
      - vpn-uplink
      - browser-control
    volumes:
      - ./.secret:/input/.secret:ro
      - vpn-egress-runtime:/runtime

  playwright-mcp-router:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/playwright/Dockerfile
    command:
      - browser-vpn-runtime-playwright-mcp-router
      - --allowed-hosts
      - localhost,127.0.0.1,playwright-mcp-router
      - --backend-runtime-root-path
      - /runtime/playwright_mcp_backend
      - --candidate-root-path
      - /runtime/mcp_playwright_profile/writeback_candidate
      - --data-source-path
      - /input/.secret
      - --output-root-path
      - /output/.playwright-mcp
      - --profile-root-path
      - /runtime/mcp_playwright_profile/profile
      - --host
      - 0.0.0.0
      - --port
      - "8931"
      - --vpn-proxy-server
      - vpn-egress:1080
    depends_on:
      vpn-egress:
        condition: service_healthy
    environment:
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 8931), 2).close()"
      timeout: 5s
    networks:
      - browser-control
    profiles:
      - vpn
    volumes:
      - ./.secret:/input/.secret:ro
      - browser-profile-runtime:/runtime/mcp_playwright_profile
      - ${OUTPUT_DIR:-./out}:/output

  workflow:
    build:
      args:
        WORKFLOW_PLATFORM_BASE_IMAGE: ${WORKFLOW_PLATFORM_BASE_IMAGE:-127.0.0.1:5001/apwid-workflow-platform-base:0.5.3}
      context: .
      dockerfile: docker/workflow/Dockerfile
    command:
      - brand-size-chart-run
    depends_on:
      playwright-mcp-router:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DBOS_SYSTEM_DATABASE_URL: sqlite:////runtime/dbos.sqlite
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      WORKFLOW_CAPABILITY_CONFIG_PATH: /input/capability.json
      WORKFLOW_CONTROL_URL: ${WORKFLOW_CONTROL_URL:?Set WORKFLOW_CONTROL_URL to a v1 control proxy reachable from Compose}
      WORKFLOW_INPUT_PATH: /input/input.json
      WORKFLOW_RUN_ID: ${WORKFLOW_RUN_ID:-local}
      WORKFLOW_RUNTIME_PATH: /runtime
    profiles:
      - vpn
    networks:
      - vpn-uplink
      - browser-control
    volumes:
      - ./.secret:/input/.secret:ro
      - ./compose.capability.json:/input/capability.json:ro
      - type: bind
        source: ${INPUT_JSON:?Set INPUT_JSON to a complete workflow input JSON file path}
        target: /input/input.json
        read_only: true
        bind:
          create_host_path: false
      - ${OUTPUT_DIR:-./out}:/result
      - workflow-runtime:/runtime
      - workflow-workspace:/workspace

volumes:
  browser-profile-runtime:
  vpn-egress-runtime:
  workflow-runtime:
  workflow-workspace:

networks:
  browser-control:
    internal: true
  vpn-uplink:
    internal: false
