services:
  openvpn:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/openvpn/Dockerfile
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    profiles:
      - vpn
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - ip link show tun0 >/dev/null 2>&1
      timeout: 5s
    volumes:
      - ./.secret:/input/.secret:ro
      - openvpn-runtime:/runtime

  playwright-mcp:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/playwright/Dockerfile
    entrypoint: []
    command:
      - bash
      - -lc
      - >
        cleanup() { chown -R "$${HOST_UID}:$${HOST_GID}" /output 2>/dev/null || true; };
        trap cleanup EXIT;
        browser-vpn-runtime-playwright-mcp
        --allowed-hosts localhost,127.0.0.1,openvpn
        --data-source-path /input/.secret
        --persistent-profile-path "/runtime/browser_vpn_runtime/playwright_profile"
        --output-dir /output/.playwright-mcp/current
        --mcp-config-path "/runtime/browser_vpn_runtime/playwright_mcp/config.json"
        --host 0.0.0.0
        --port 8931
        --require-openvpn
    depends_on:
      openvpn:
        condition: service_healthy
    environment:
      HOST_GID: ${HOST_GID:-1000}
      HOST_UID: ${HOST_UID:-1000}
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 8931), 2).close()"
      timeout: 5s
    network_mode: service:openvpn
    profiles:
      - vpn
    volumes:
      - ./.secret:/input/.secret:ro
      - ${OUTPUT_DIR:-./out}:/output

  workflow:
    build:
      additional_contexts:
        workflow_container_runtime: ${WORKFLOW_CONTAINER_RUNTIME_CONTEXT:-../workflow-container-runtime}
      context: .
      dockerfile: docker/workflow/Dockerfile
    command:
      - bash
      - -lc
      - >
        cleanup() { chown -R "$${HOST_UID}:$${HOST_GID}" /output 2>/dev/null || true; };
        trap cleanup EXIT;
        mkdir -p /runtime
        && cd /workspace/brand-size-chart
        && brand-size-chart-run
        --browser-runtime-mcp-url "$${BROWSER_RUNTIME_MCP_URL}"
        --workflow-run-id "$${WORKFLOW_RUN_ID:-local}"
        --brand-list /input/brand_list.txt
        --input-secret /input/.secret
        --secret /runtime/.secret
        --output-dir /output
        --workflow-run-prompt "$${WORKFLOW_RUN_PROMPT:-}"
    depends_on:
      playwright-mcp:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      BRAND_LIST: ${BRAND_LIST:-./brand_list.txt}
      BROWSER_RUNTIME_MCP_URL: http://openvpn:8931/mcp
      DBOS_SYSTEM_DATABASE_URL: sqlite:////runtime/dbos.sqlite
      HOST_GID: ${HOST_GID:-1000}
      HOST_UID: ${HOST_UID:-1000}
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      WORKFLOW_RUN_ID: ${WORKFLOW_RUN_ID:-local}
      WORKFLOW_RUN_PROMPT: ${WORKFLOW_RUN_PROMPT:-}
    profiles:
      - vpn
    volumes:
      - ./.secret:/input/.secret:ro
      - ${BRAND_LIST:-./brand_list.txt}:/input/brand_list.txt:ro
      - ${OUTPUT_DIR:-./out}:/output

volumes:
  openvpn-runtime:
