services:
  vpn-egress:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/openvpn/Dockerfile
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    profiles:
      - vpn
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 1080), 2).close()"
      timeout: 5s
    networks:
      - vpn-uplink
      - browser-control
    volumes:
      - ./.secret:/input/.secret:ro
      - vpn-egress-runtime:/runtime

  playwright-mcp-router:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/playwright/Dockerfile
    command:
      - browser-vpn-runtime-playwright-mcp-router
      - --allowed-hosts
      - localhost,127.0.0.1,playwright-mcp-router
      - --backend-runtime-root-path
      - /runtime/playwright_mcp_backend
      - --candidate-root-path
      - /runtime/mcp_playwright_profile/writeback_candidate
      - --data-source-path
      - /input/.secret
      - --output-root-path
      - /output/.playwright-mcp
      - --profile-root-path
      - /runtime/mcp_playwright_profile/profile
      - --host
      - 0.0.0.0
      - --port
      - "8931"
      - --vpn-proxy-server
      - vpn-egress:1080
    depends_on:
      vpn-egress:
        condition: service_healthy
    environment:
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 8931), 2).close()"
      timeout: 5s
    networks:
      - browser-control
    profiles:
      - vpn
    volumes:
      - ./.secret:/input/.secret:ro
      - browser-profile-runtime:/runtime/mcp_playwright_profile
      - ${OUTPUT_DIR:-./out}:/output

  workflow:
    build:
      additional_contexts:
        workflow_container_contract: ${WORKFLOW_CONTAINER_CONTRACT_CONTEXT:-../workflow-container-contract}
        workflow_container_runtime: ${WORKFLOW_CONTAINER_RUNTIME_CONTEXT:-../workflow-container-runtime}
      context: .
      dockerfile: docker/workflow/Dockerfile
    command:
      - bash
      - -lc
      - >
        cleanup() { chown -R "$${HOST_UID}:$${HOST_GID}" /output 2>/dev/null || true; };
        trap cleanup EXIT;
        mkdir -p /runtime
        && cd /workspace/brand-size-chart
        && brand-size-chart-run
        --mcp-playwright-profile-source "$${MCP_PLAYWRIGHT_PROFILE_SOURCE}"
        --mcp-playwright-profile-writeback-candidate-url "$${MCP_PLAYWRIGHT_PROFILE_WRITEBACK_CANDIDATE_URL}"
        --mcp-url "$${MCP_URL}"
        --workflow-run-id "$${WORKFLOW_RUN_ID:-local}"
        --input /input/input.json
        --input-secret /input/.secret
        --secret /runtime/.secret
        --output-dir /output
    depends_on:
      playwright-mcp-router:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DBOS_SYSTEM_DATABASE_URL: sqlite:////runtime/dbos.sqlite
      HOST_GID: ${HOST_GID:-1000}
      HOST_UID: ${HOST_UID:-1000}
      MCP_PLAYWRIGHT_PROFILE_SOURCE: /input/.secret/playwright_profile
      MCP_PLAYWRIGHT_PROFILE_WRITEBACK_CANDIDATE_URL: http://playwright-mcp-router:8931/runtime/mcp-playwright-profile/writeback-candidate
      MCP_URL: http://playwright-mcp-router:8931/mcp
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      WORKFLOW_RUN_ID: ${WORKFLOW_RUN_ID:-local}
    profiles:
      - vpn
    networks:
      - vpn-uplink
      - browser-control
    volumes:
      - ./.secret:/input/.secret:ro
      - type: bind
        source: ${INPUT_JSON:?Set INPUT_JSON to a complete workflow input JSON file path}
        target: /input/input.json
        read_only: true
        bind:
          create_host_path: false
      - ${OUTPUT_DIR:-./out}:/output

volumes:
  browser-profile-runtime:
  vpn-egress-runtime:

networks:
  browser-control:
    internal: true
  vpn-uplink:
    internal: false
