services:
  vpn-egress:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/openvpn/Dockerfile
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    profiles:
      - vpn
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 1080), 2).close()"
      timeout: 5s
    networks:
      - vpn-uplink
      - browser-control
    volumes:
      - ./.secret:/input/.secret:ro
      - vpn-egress-runtime:/runtime

  playwright-mcp:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/playwright/Dockerfile
    command:
      - browser-vpn-runtime-playwright-mcp
      - --allowed-hosts
      - localhost,127.0.0.1,playwright-mcp
      - --data-source-path
      - /input/.secret
      - --persistent-profile-path
      - /runtime-profile/playwright_profile
      - --output-dir
      - /output/.playwright-mcp/current
      - --mcp-config-path
      - /runtime/browser_vpn_runtime/playwright_mcp/config.json
      - --host
      - 0.0.0.0
      - --port
      - "8931"
      - --vpn-proxy-server
      - vpn-egress:1080
    depends_on:
      vpn-egress:
        condition: service_healthy
    environment:
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 8931), 2).close()"
      timeout: 5s
    networks:
      - browser-control
    profiles:
      - vpn
    volumes:
      - ./.secret:/input/.secret:ro
      - browser-profile-runtime:/runtime-profile
      - ${OUTPUT_DIR:-./out}:/output

  playwright-profile-writeback:
    build:
      context: ${BROWSER_VPN_RUNTIME_CONTEXT:-../browser-vpn-runtime}
      dockerfile: docker/playwright/Dockerfile
    command:
      - browser-vpn-runtime-playwright-profile-snapshot
      - --runtime-profile-path
      - /runtime-profile/playwright_profile
      - --writeback-root-path
      - /writeback
      - --owner-uid
      - ${HOST_UID:-1000}
      - --owner-gid
      - ${HOST_GID:-1000}
    profiles:
      - writeback
    volumes:
      - browser-profile-runtime:/runtime-profile:ro
      - ./.secret:/writeback

  workflow:
    build:
      additional_contexts:
        workflow_container_contract: ${WORKFLOW_CONTAINER_CONTRACT_CONTEXT:-../workflow-container-contract}
        workflow_container_runtime: ${WORKFLOW_CONTAINER_RUNTIME_CONTEXT:-../workflow-container-runtime}
      context: .
      dockerfile: docker/workflow/Dockerfile
    command:
      - bash
      - -lc
      - >
        cleanup() { chown -R "$${HOST_UID}:$${HOST_GID}" /output 2>/dev/null || true; };
        trap cleanup EXIT;
        mkdir -p /runtime
        && cd /workspace/brand-size-chart
        && brand-size-chart-run
        --browser-runtime-mcp-url "$${BROWSER_RUNTIME_MCP_URL}"
        --workflow-run-id "$${WORKFLOW_RUN_ID:-local}"
        --input /input/input.json
        --input-secret /input/.secret
        --secret /runtime/.secret
        --output-dir /output
    depends_on:
      playwright-mcp:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      BROWSER_RUNTIME_MCP_URL: http://playwright-mcp:8931/mcp
      DBOS_SYSTEM_DATABASE_URL: sqlite:////runtime/dbos.sqlite
      HOST_GID: ${HOST_GID:-1000}
      HOST_UID: ${HOST_UID:-1000}
      OUTPUT_DIR: ${OUTPUT_DIR:-./out}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      WORKFLOW_RUN_ID: ${WORKFLOW_RUN_ID:-local}
    profiles:
      - vpn
    networks:
      - vpn-uplink
      - browser-control
    volumes:
      - ./.secret:/input/.secret:ro
      - type: bind
        source: ${INPUT_JSON:?Set INPUT_JSON to a complete workflow input JSON file path}
        target: /input/input.json
        read_only: true
        bind:
          create_host_path: false
      - ${OUTPUT_DIR:-./out}:/output

volumes:
  browser-profile-runtime:
  vpn-egress-runtime:

networks:
  browser-control:
    internal: true
  vpn-uplink:
    internal: false
