name: brand_size_chart
build:
  dockerfile_path: docker/workflow/Dockerfile
input_schema_path: input.schema.json
command:
  - brand-size-chart-run
test:
  command:
    - python
    - -m
    - pytest
    - -q
data_mount_list:
  - mount_key: secret
    container_path: /input/.secret
    access_mode: read_only
    data_source_type: secret
    publication_trigger_list: []
  - mount_key: workspace
    container_path: /workspace
    access_mode: read_write
    data_source_type: data
    publication_trigger_list:
      - safepoint
      - terminal
  - mount_key: result
    container_path: /result
    access_mode: read_write
    data_source_type: data
    publication_trigger_list:
      - safepoint
      - terminal
runtime_capability_list:
  - name: browser_vpn_runtime
    data_mount_key: secret
