name: brand_size_chart
build:
  dockerfile_path: docker/workflow/Dockerfile
input_schema_path: input.schema.json
command:
  - brand-size-chart-run
test:
  command:
    - python
    - -m
    - pytest
    - -q
data:
  run:
    result: result/{brand_key}
    workspace: workspace/{brand_key}
dataset:
  brand_size_chart:
    data_path_template: result/{brand_key}/dataset/brand_size_chart
    format: json_lines
    manifest_key: result
    schema_path: dataset/brand_size_chart.schema.json
    schema_version: 1
secret:
  codex_profile:
    kind: directory
    path: /input/.secret/codex_profile
  playwright_profile:
    kind: directory
    path: /input/.secret/playwright_profile
step:
  brand_complete: {}
  canonical_select: {}
  coverage_decide: {}
  source_discover: {}
runtime_capability_list:
  - name: browser_vpn_runtime
    config:
      is_vpn_enabled: false
    secret_key_list:
      - playwright_profile
